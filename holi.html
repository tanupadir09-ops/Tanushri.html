<!DOCTYPE html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Holi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(45deg, #ff4e50, #fc913a, #f9d423, #ede574, #e1f5c4);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 60px;
            margin-top: 100px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
        }

        p {
            font-size: 24px;
            margin-top: 20px;
        }

        .button {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 20px;
            background-color: white;
            color: #ff4e50;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #ff4e50;
            color: white;
        }
    </style>
</head>
<body>

    <h1>🎉 Happy Holi 🎉</h1>
    <p>Wishing you a colorful and joyful Holi!</p>

    <button class="button" onclick="showMessage()">Celebrate!</button>

    <script>
        function showMessage() {
            alert("May your life be filled with colors of happiness! 🌈 Happy Holi!");
        }
    </script>

</body>
</html>

</html>
